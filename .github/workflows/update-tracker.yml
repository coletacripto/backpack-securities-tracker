name: Update tracker data

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update tracker snapshot
        run: python tracker_update.py --once

      - name: Commit updated snapshot
        run: |
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@example.com"
          git add tracker_site/data/snapshot.json
          git commit -m "Update tracker snapshot" || exit 0
          git push
